<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">OverSeek custom dashboard</title>
  <desc id="desc">Dashboard preview with collapsible navigation, account switcher, revenue, live visitors, inbox, SEO and operations widgets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <linearGradient id="brand" x1="0" x2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="44" y="40" width="1352" height="820" rx="34" fill="#fff" filter="url(#shadow)"/>
  <rect x="44" y="40" width="230" height="820" rx="34" fill="#f8fafc"/>
  <rect x="76" y="80" width="166" height="52" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <circle cx="104" cy="106" r="15" fill="url(#brand)"/><text x="130" y="111" font-family="Inter,Arial" font-size="18" font-weight="700" fill="#0f172a">OverSeek</text>
  <g font-family="Inter,Arial" font-size="15" fill="#64748b">
    <rect x="76" y="172" width="166" height="42" rx="13" fill="#e0edff"/><text x="116" y="198" fill="#2563eb" font-weight="700">Dashboard</text>
    <text x="116" y="252">Inbox</text><text x="116" y="306">Commerce</text><text x="116" y="360">Shipping</text><text x="116" y="414">Emails</text><text x="116" y="468">Analytics</text><text x="116" y="522">Growth</text><text x="116" y="576">Team</text>
  </g>
  <g transform="translate(318 84)">
    <text font-family="Inter,Arial" font-size="34" font-weight="800" fill="#0f172a">Command dashboard</text>
    <text y="35" font-family="Inter,Arial" font-size="16" fill="#64748b">Drag-and-drop widgets for the work that matters today.</text>
  </g>
  <rect x="1120" y="78" width="214" height="50" rx="16" fill="#eff6ff"/><text x="1154" y="109" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#2563eb">Today vs smart period</text>
  <g font-family="Inter,Arial">
    <rect x="318" y="174" width="300" height="170" rx="24" fill="#0f172a"/><text x="346" y="216" font-size="15" fill="#94a3b8">Revenue</text><text x="346" y="267" font-size="44" font-weight="800" fill="#fff">$42,180</text><text x="346" y="304" font-size="17" fill="#34d399">+18.4% from comparison</text>
    <rect x="646" y="174" width="300" height="170" rx="24" fill="#fff" stroke="#e2e8f0"/><text x="674" y="216" font-size="15" fill="#64748b">Live visitors</text><text x="674" y="267" font-size="44" font-weight="800" fill="#0f172a">128</text><path d="M674 300 C720 252 758 324 803 282 S884 268 910 224" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <rect x="974" y="174" width="300" height="170" rx="24" fill="#fff" stroke="#e2e8f0"/><text x="1002" y="216" font-size="15" fill="#64748b">Inbox</text><text x="1002" y="267" font-size="44" font-weight="800" fill="#0f172a">23</text><text x="1002" y="304" font-size="17" fill="#ef4444">7 need a reply</text>
    <rect x="318" y="376" width="460" height="250" rx="24" fill="#fff" stroke="#e2e8f0"/><text x="346" y="418" font-size="19" font-weight="800" fill="#0f172a">Operations queue</text><rect x="346" y="452" width="382" height="18" rx="9" fill="#e2e8f0"/><rect x="346" y="492" width="322" height="18" rx="9" fill="#dbeafe"/><rect x="346" y="532" width="398" height="18" rx="9" fill="#e2e8f0"/><rect x="346" y="572" width="278" height="18" rx="9" fill="#fee2e2"/>
    <rect x="810" y="376" width="464" height="250" rx="24" fill="#fff" stroke="#e2e8f0"/><text x="838" y="418" font-size="19" font-weight="800" fill="#0f172a">Channel health</text><circle cx="878" cy="505" r="54" fill="#dbeafe"/><circle cx="878" cy="505" r="32" fill="#2563eb"/><text x="958" y="488" font-size="17" fill="#334155">Google Ads ROAS up</text><text x="958" y="528" font-size="17" fill="#334155">Email bounces stable</text><text x="958" y="568" font-size="17" fill="#334155">SEO clicks trending</text>
    <rect x="318" y="658" width="956" height="118" rx="24" fill="url(#brand)"/><text x="350" y="707" font-size="22" font-weight="800" fill="#fff">Widget library</text><text x="350" y="746" font-size="17" fill="#dbeafe">Revenue, products, live acquisition, open inbox, gold margin, SEO, ad suggestions, email logs and more.</text>
  </g>
</svg>
