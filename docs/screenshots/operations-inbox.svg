<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">OverSeek operations inbox</title><desc id="desc">Inbox preview with conversation list, message thread, customer profile, order context and AI draft button.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfeff"/></linearGradient><linearGradient id="brand" x1="0" x2="1"><stop stop-color="#0891b2"/><stop offset="1" stop-color="#2563eb"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/></filter></defs>
  <rect width="1440" height="900" fill="url(#bg)"/><rect x="44" y="40" width="1352" height="820" rx="34" fill="#fff" filter="url(#shadow)"/>
  <rect x="44" y="40" width="214" height="820" rx="34" fill="#f8fafc"/><text x="82" y="108" font-family="Inter,Arial" font-size="22" font-weight="800" fill="#0f172a">Inbox</text><rect x="76" y="144" width="150" height="40" rx="12" fill="#dbeafe"/><text x="104" y="169" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#2563eb">Unread 7</text>
  <g font-family="Inter,Arial"><rect x="290" y="84" width="360" height="692" rx="28" fill="#f8fafc" stroke="#e2e8f0"/><text x="324" y="130" font-size="24" font-weight="800" fill="#0f172a">Conversations</text><rect x="324" y="160" width="290" height="42" rx="14" fill="#fff" stroke="#e2e8f0"/><text x="348" y="187" font-size="14" fill="#94a3b8">Search name, order, email...</text>
  <rect x="324" y="236" width="290" height="94" rx="18" fill="#e0f2fe"/><circle cx="360" cy="276" r="20" fill="url(#brand)"/><text x="394" y="269" font-size="15" font-weight="800" fill="#0f172a">Mia Chen</text><text x="394" y="296" font-size="14" fill="#475569">Can I change the chain...</text><rect x="324" y="348" width="290" height="86" rx="18" fill="#fff"/><circle cx="360" cy="388" r="20" fill="#c7d2fe"/><text x="394" y="382" font-size="15" font-weight="800" fill="#0f172a">Alex Martin</text><text x="394" y="409" font-size="14" fill="#64748b">Order arrived, thank you</text><rect x="324" y="452" width="290" height="86" rx="18" fill="#fff"/><circle cx="360" cy="492" r="20" fill="#fed7aa"/><text x="394" y="486" font-size="15" font-weight="800" fill="#0f172a">Priya Singh</text><text x="394" y="513" font-size="14" fill="#64748b">Need invoice copy</text>
  <rect x="682" y="84" width="430" height="692" rx="28" fill="#fff" stroke="#e2e8f0"/><text x="720" y="130" font-size="24" font-weight="800" fill="#0f172a">Mia Chen</text><text x="720" y="158" font-size="14" fill="#64748b">Order #58421 · WooCommerce customer</text><rect x="728" y="216" width="270" height="76" rx="18" fill="#f1f5f9"/><text x="754" y="248" font-size="15" fill="#334155">Hi, can I change the chain length before it ships?</text><rect x="806" y="330" width="270" height="94" rx="18" fill="#dbeafe"/><text x="832" y="363" font-size="15" fill="#1e3a8a">Yes. I can update this to 50cm and keep the same pendant.</text><rect x="728" y="462" width="270" height="76" rx="18" fill="#f1f5f9"/><text x="754" y="494" font-size="15" fill="#334155">Perfect, please do that.</text><rect x="728" y="638" width="320" height="64" rx="18" fill="#fff" stroke="#cbd5e1"/><text x="754" y="677" font-size="15" fill="#94a3b8">Write a reply...</text><rect x="914" y="646" width="120" height="48" rx="14" fill="url(#brand)"/><text x="946" y="676" font-size="15" font-weight="800" fill="#fff">AI draft</text>
  <rect x="1144" y="84" width="200" height="692" rx="28" fill="#f8fafc" stroke="#e2e8f0"/><text x="1176" y="130" font-size="20" font-weight="800" fill="#0f172a">Context</text><text x="1176" y="178" font-size="14" fill="#64748b">Lifetime value</text><text x="1176" y="214" font-size="28" font-weight="800" fill="#0f172a">$1,284</text><text x="1176" y="278" font-size="14" fill="#64748b">Latest order</text><text x="1176" y="310" font-size="17" font-weight="800" fill="#0f172a">#58421</text><rect x="1176" y="342" width="118" height="34" rx="12" fill="#dcfce7"/><text x="1198" y="364" font-size="13" font-weight="800" fill="#166534">Ready</text><text x="1176" y="436" font-size="14" fill="#64748b">Tags</text><rect x="1176" y="460" width="92" height="32" rx="10" fill="#e0e7ff"/><text x="1194" y="481" font-size="13" fill="#3730a3">VIP</text></g>
</svg>
