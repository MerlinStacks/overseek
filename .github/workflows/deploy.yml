##
# CI/CD Pipeline — Build & push per-service Docker images to GHCR.
# Portainer GitOps (or webhooks) handles the deployment side.
#
# Why per-service: Avoids rebuilding the entire stack when only one
# service changed. Change detection uses dorny/paths-filter so the
# client build is skipped when only server/ files are modified (and
# vice versa).
##

name: Build & Deploy

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build (api, web, or both)"
        required: false
        default: "both"
        type: choice
        options:
          - api
          - web
          - both

# Cancel in-flight runs for the same branch — no point building stale commits
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Lowercase owner — GHCR requires lowercase image names
  IMAGE_OWNER: merlinstacks

permissions:
  contents: read
  packages: write

jobs:
  # ── Step 1: Detect which services have changed files ─────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'server/**'
              - 'packages/overseek-core/**'
              - 'package.json'
              - 'package-lock.json'
              - 'docker-compose.yml'
            web:
              - 'client/**'
              - 'packages/overseek-core/**'

  # ── Step 2a: Build & push API image ──────────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.api == 'true' ||
      github.event.inputs.force_build == 'api' ||
      github.event.inputs.force_build == 'both'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/overseek-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/overseek-api:${{ github.sha }}
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: Ping Portainer webhook for instant redeploy
      - name: Trigger Portainer redeploy (API)
        if: vars.PORTAINER_WEBHOOK_API != ''
        run: curl -sS -X POST "${{ vars.PORTAINER_WEBHOOK_API }}" || true
        # Why || true: webhook failure should not fail the build — Portainer
        # GitOps polling will pick up the change on its next cycle regardless.

  # ── Step 2b: Build & push Web image ──────────────────────────────────────────
  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.web == 'true' ||
      github.event.inputs.force_build == 'web' ||
      github.event.inputs.force_build == 'both'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/overseek-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/overseek-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: Ping Portainer webhook for instant redeploy
      - name: Trigger Portainer redeploy (Web)
        if: vars.PORTAINER_WEBHOOK_WEB != ''
        run: curl -sS -X POST "${{ vars.PORTAINER_WEBHOOK_WEB }}" || true
